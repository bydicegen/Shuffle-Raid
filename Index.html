<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shuffle Raid v3.0 - GitHub Edition</title>
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;400;700&display=swap');
        
        :root {
            --primary-accent: #f59e0b;
            --bg-main: #ffffff;
            --text-main: #0f172a;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .fantasy-font { font-family: 'Cinzel', serif; }

        .ability-btn {
            transition: all 0.2s ease-out;
            position: relative;
            overflow: hidden;
        }
        .ability-btn:active:not(:disabled) { transform: scale(0.95); }
        .ability-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .cooldown-overlay {
            background: rgba(15, 23, 42, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
            z-index: 10;
        }

        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .animate-bounce-subtle { animation: bounceSubtle 2s infinite; }
        @keyframes bounceSubtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & ReactDOM via ESM -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
    </script>

    <script type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        
        // Firebase SDKs via CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, updateDoc, arrayUnion, getDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDnfytB6714BdUUMRMD8RjB-VFxiRq-ShM",
            authDomain: "shuffle-raid-bf1c3.firebaseapp.com",
            projectId: "shuffle-raid-bf1c3",
            storageBucket: "shuffle-raid-bf1c3.firebasestorage.app",
            messagingSenderId: "471193527658",
            appId: "1:471193527658:web:cc8666660b7967975af113",
            measurementId: "G-JWLQR80K84"
        };

        let auth, db;
        try {
            const firebaseApp = initializeApp(firebaseConfig);
            auth = getAuth(firebaseApp);
            db = getFirestore(firebaseApp);
        } catch (error) {
            console.error("Firebase initialization failed:", error);
        }

        // --- CONSTANTES DEL JUEGO ---
        const CLASSES = {
            Warrior: { 
                hp: 20, def: 2, baseAtk: 3, icon: 'fa-shield-halved', color: 'amber',
                abilities: [
                    { id: 'basic_atk', name: 'Ataque Básico', type: 'Attack', cost: 1, cooldown: 0, power: 3, icon: 'fa-sword' },
                    { id: 'strong_atk', name: 'Ataque Fuerte', type: 'Attack', cost: 3, cooldown: 2, power: 6, icon: 'fa-gavel' },
                    { id: 'intervene', name: 'Intervenir', type: 'Support', cost: 2, cooldown: 2, power: 0, desc: 'Recibe el próximo ataque por un aliado', icon: 'fa-handshake-angle' }
                ]
            },
            Mage: { 
                hp: 15, def: 1, baseAtk: 3, icon: 'fa-wand-sparkles', color: 'blue',
                abilities: [
                    { id: 'basic_atk', name: 'Ataque Básico', type: 'Attack', cost: 1, cooldown: 0, power: 3, icon: 'fa-sparkles' },
                    { id: 'incinerate', name: 'Incinerar', type: 'Attack', cost: 3, cooldown: 2, power: 3, desc: 'Daño y quemadura', icon: 'fa-fire-flame-curved' },
                    { id: 'magic_shield', name: 'Escudo Mágico', type: 'Support', cost: 2, cooldown: 2, power: 2, desc: 'Escudo de 2 puntos', icon: 'fa-shield-heart' }
                ]
            },
            Hunter: { 
                hp: 15, def: 1, baseAtk: 3, icon: 'fa-crosshairs', color: 'emerald',
                abilities: [
                    { id: 'basic_atk', name: 'Ataque Básico', type: 'Attack', cost: 1, cooldown: 0, power: 3, icon: 'fa-arrow-right' },
                    { id: 'multi_shot', name: 'Disparo Múltiple', type: 'Attack', cost: 3, cooldown: 2, power: 4, desc: '2 flechas de 2 daño', icon: 'fa-arrows-to-dot' },
                    { id: 'distraction_shot', name: 'Disparo de Distracción', type: 'Support', cost: 2, cooldown: 2, power: 0, desc: 'Evita ataque a aliado (Dado 6-20)', icon: 'fa-eye-slash' }
                ]
            }
        };

        const ENEMIES = [
            { name: "Horda de Goblins", hp: 12, maxHp: 12, damage: 4, def: 1, icon: 'fa-users-viewfinder' },
            { name: "Ogro del Pantano", hp: 26, maxHp: 26, damage: 9, def: 2, icon: 'fa-hand-fist' },
            { name: "Gólem Arcano", hp: 38, maxHp: 38, damage: 7, def: 5, icon: 'fa-mountain' },
            { name: "Fragmento de T'zel", hp: 50, maxHp: 50, damage: 0, def: 0, icon: 'fa-gem' }
        ];

        const DIFFICULTY_CONFIG = { 'Fácil': 10, 'Normal': 15, 'Difícil': 20 };

        // --- UTILIDADES ---
        const generateRoomCode = () => Math.random().toString(36).substring(2, 7).toUpperCase();
        const shuffleArray = (arr) => [...arr].sort(() => Math.random() - 0.5);

        // --- COMPONENTES ---
        function SubMenuLayout({ title, subtitle, onBack, children }) {
            return (
                <div className="min-h-screen bg-white p-6 flex flex-col items-center justify-center animate-fade-in">
                    <button onClick={onBack} className="self-start mb-6 text-slate-300 hover:text-slate-900 flex items-center gap-2 font-black text-[10px] tracking-[0.3em] uppercase transition-colors">
                        <i className="fa-solid fa-arrow-left"></i> Volver
                    </button>
                    <h1 className="text-3xl text-slate-900 fantasy-font mb-1 uppercase tracking-tighter text-center">{title}</h1>
                    <p className="text-slate-400 mb-10 tracking-[0.2em] uppercase text-[9px] font-black text-center">{subtitle}</p>
                    <div className="w-full max-w-xs space-y-3">{children}</div>
                </div>
            );
        }

        function AuthScreen() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isReg, setIsReg] = useState(false);
            const handleAuth = async (e) => {
                e.preventDefault();
                if (!auth) return alert("Firebase no inicializado");
                try {
                    if (isReg) await createUserWithEmailAndPassword(auth, email, password);
                    else await signInWithEmailAndPassword(auth, email, password);
                } catch (err) { alert(err.message); }
            };

            return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center p-6 text-center animate-fade-in">
                    <h1 className="text-5xl fantasy-font text-slate-900 mb-2 uppercase tracking-tighter">SHUFFLE RAID</h1>
                    <p className="text-slate-400 mb-12 uppercase tracking-[0.4em] text-[10px] font-black">Multiplayer RPG Edition</p>
                    <form onSubmit={handleAuth} className="w-full max-w-xs space-y-4">
                        <input type="email" placeholder="EMAIL" className="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none focus:border-amber-500 font-bold text-xs shadow-sm" value={email} onChange={e => setEmail(e.target.value)} required />
                        <input type="password" placeholder="PASSWORD" className="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 outline-none focus:border-amber-500 font-bold text-xs shadow-sm" value={password} onChange={e => setPassword(e.target.value)} required />
                        <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg active:scale-95 transition-all">CONECTAR</button>
                    </form>
                    <button onClick={() => setIsReg(!isReg)} className="mt-8 text-slate-400 text-[9px] font-black tracking-widest uppercase">{isReg ? 'Tengo cuenta' : 'Nuevo héroe'}</button>
                </div>
            );
        }

        function LobbyWaiting({ matchId, user, onStart, onLeave }) {
            const [match, setMatch] = useState(null);
            useEffect(() => {
                return onSnapshot(doc(db, 'matches', matchId), (snap) => {
                    if (!snap.exists()) { onLeave(); return; }
                    const data = snap.data();
                    setMatch(data);
                    if (data.status === 'combat') onStart();
                });
            }, [matchId]);

            if (!match) return null;
            const myPlayer = match.players.find(p => p.uid === user.uid);
            const isHost = myPlayer?.role === 'host';
            const takenClasses = match.players.map(p => p.classType).filter(Boolean);
            const allReady = match.players.every(p => p.role === 'host' || p.isReady);

            const selectHero = async (classType) => {
                if (takenClasses.includes(classType) && myPlayer.classType !== classType) return;
                const updatedPlayers = match.players.map(p => 
                    p.uid === user.uid ? { ...p, classType, isReady: false, hp: CLASSES[classType].hp, pa: 5, cooldowns: {} } : p
                );
                await updateDoc(doc(db, 'matches', matchId), { players: updatedPlayers });
            };

            const toggleReady = async () => {
                if (!myPlayer.classType) return;
                const updatedPlayers = match.players.map(p => p.uid === user.uid ? { ...p, isReady: !p.isReady } : p);
                await updateDoc(doc(db, 'matches', matchId), { players: updatedPlayers });
            };

            const startCombat = async () => {
                if (!isHost || !allReady) return;
                const updatedPlayers = match.players.map(p => ({ ...p, ownerUid: p.uid, shield: 0, intervenedBy: null, distracted: false, cooldowns: p.cooldowns || {} }));
                const order = shuffleArray(updatedPlayers.map(p => p.uid));
                await updateDoc(doc(db, 'matches', matchId), { players: updatedPlayers, status: 'combat', turnOrder: order, activeTurnUid: order[0], phase: 'players', playersReadyForNext: [] });
            };

            return (
                <div className="min-h-screen bg-white flex flex-col p-6 overflow-hidden">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={onLeave} className="text-slate-300 font-black text-[10px] uppercase tracking-widest hover:text-red-500">Salir</button>
                        <div className="bg-slate-50 px-5 py-2 rounded-full border border-slate-100 flex items-center gap-3">
                           <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Código</span>
                           <span className="text-[12px] fantasy-font font-bold text-slate-900 tracking-wider">{matchId}</span>
                        </div>
                    </div>
                    <div className="flex-grow flex flex-col gap-6 overflow-hidden">
                        <div className="space-y-3">
                            {match.players.map((p, i) => (
                                <div key={i} className="flex items-center gap-4 bg-slate-50 p-4 rounded-3xl border border-slate-100 relative">
                                    <div className={`w-12 h-12 ${p.classType ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-200 text-slate-400'} rounded-2xl flex items-center justify-center text-xl`}>
                                        <i className={`fa-solid ${p.classType ? CLASSES[p.classType].icon : 'fa-user-clock'}`}></i>
                                    </div>
                                    <div className="flex-grow">
                                        <p className="text-[10px] font-black uppercase text-slate-900">{p.name} {p.role === 'host' && '👑'}</p>
                                        <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">{p.classType || 'Eligiendo...'}</p>
                                    </div>
                                    {p.role !== 'host' && <div className={`w-8 h-8 rounded-xl flex items-center justify-center ${p.isReady ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-400'}`}><i className="fa-solid fa-check text-[10px]"></i></div>}
                                </div>
                            ))}
                        </div>
                        {!myPlayer?.isReady && (
                            <div className="grid grid-cols-3 gap-3">
                                {Object.keys(CLASSES).map(key => {
                                    const isTaken = takenClasses.includes(key);
                                    const isMine = myPlayer.classType === key;
                                    return (
                                        <button key={key} onClick={() => selectHero(key)} disabled={isTaken && !isMine} className={`flex flex-col items-center justify-center p-4 rounded-3xl border transition-all ${isMine ? 'bg-slate-900 border-slate-900 text-white scale-105 shadow-xl' : (isTaken ? 'opacity-30 border-slate-100 grayscale cursor-not-allowed' : 'bg-white border-slate-100 text-slate-400 hover:border-amber-400')}`}>
                                            <i className={`fa-solid ${CLASSES[key].icon} text-xl mb-2`}></i>
                                            <span className="text-[7px] font-black uppercase">{key}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                        <button onClick={isHost ? startCombat : toggleReady} disabled={!myPlayer.classType || (isHost && !allReady)} className={`w-full py-5 rounded-[28px] font-black uppercase text-[10px] tracking-widest shadow-xl transition-all ${myPlayer.isReady || (isHost && allReady) ? 'bg-emerald-500 text-white' : 'bg-slate-900 text-white disabled:opacity-30'}`}>
                            {isHost ? 'Empezar Incursión' : (myPlayer.isReady ? '¡Listo!' : 'Confirmar Héroe')}
                        </button>
                    </div>
                </div>
            );
        }

        function GameBoard({ matchId, user, onLeave }) {
            const [match, setMatch] = useState(null);
            const [targeting, setTargeting] = useState(null);
            const logEndRef = useRef(null);

            useEffect(() => {
                return onSnapshot(doc(db, 'matches', matchId), (snap) => {
                    if (!snap.exists()) { onLeave(); return; }
                    setMatch(snap.data());
                });
            }, [matchId]);

            useEffect(() => { logEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [match?.log]);

            if (!match) return null;
            const myP = match.players.find(p => p.uid === match.activeTurnUid);
            const isMyTurn = myP?.ownerUid === user.uid && match.phase === 'players';
            const isHost = match.players.find(p => p.ownerUid === user.uid)?.role === 'host';

            const executeEnemyTurn = async (currentMatch) => {
                if (!isHost || !currentMatch.enemy) return;
                const currentTurnCount = (currentMatch.enemy.turnCount || 0) + 1;
                let logMsg = "";
                let finalPlayers;

                // 1/20 Probabilidad de Golpe Directo
                const isDirectHit = Math.random() < 0.05;
                const targetP = currentMatch.players.reduce((prev, curr) => (prev.hp < curr.hp ? prev : curr));
                let enemyDmg = isDirectHit ? currentMatch.enemy.damage : Math.max(1, currentMatch.enemy.damage - (targetP.def || 0));
                
                if (isDirectHit) logMsg = `¡GOLPE DIRECTO! ${currentMatch.enemy.name} ignora defensas. `;
                
                finalPlayers = currentMatch.players.map(p => p.uid === targetP.uid ? { ...p, hp: Math.max(0, p.hp - enemyDmg), pa: Math.min(5, p.pa + 2) } : { ...p, pa: Math.min(5, p.pa + 2) });
                logMsg += `${currentMatch.enemy.name} ataca a ${targetP.name} por ${enemyDmg} daño.`;

                await updateDoc(doc(db, 'matches', matchId), { players: finalPlayers, phase: 'players', activeTurnUid: currentMatch.turnOrder[0], log: arrayUnion(logMsg), "enemy.turnCount": currentTurnCount });
            };

            const useAbility = async (ability, targetUid) => {
                if (!isMyTurn || myP.pa < ability.cost) return;
                let updatedPlayers = [...match.players];
                let updatedEnemy = match.enemy ? { ...match.enemy } : null;
                let logMsg = `${myP.name} usa ${ability.name}.`;

                if (ability.type === 'Attack' && updatedEnemy) {
                    const dmg = Math.max(1, ability.power - updatedEnemy.def);
                    updatedEnemy.hp = Math.max(0, updatedEnemy.hp - dmg);
                }

                const meIdx = updatedPlayers.findIndex(p => p.uid === myP.uid);
                updatedPlayers[meIdx].pa -= ability.cost;
                
                const updates = { players: updatedPlayers, log: arrayUnion(logMsg) };
                if (updatedEnemy) {
                    updates.enemy = updatedEnemy;
                    if (updatedEnemy.hp === 0) { updates.enemy = null; updates.deckRemaining = increment(-1); }
                }
                await updateDoc(doc(db, 'matches', matchId), updates);
                setTargeting(null);
            };

            const endTurn = async () => {
                const currentIndex = match.turnOrder.indexOf(match.activeTurnUid);
                const nextIndex = currentIndex + 1;
                if (nextIndex < match.turnOrder.length) {
                    await updateDoc(doc(db, 'matches', matchId), { activeTurnUid: match.turnOrder[nextIndex] });
                } else {
                    await updateDoc(doc(db, 'matches', matchId), { phase: 'enemy' });
                    if (isHost) setTimeout(() => executeEnemyTurn(match), 1000);
                }
            };

            const toggleReadyToAdvance = async () => {
                const newList = [...(match.playersReadyForNext || []), user.uid];
                if (newList.length >= match.players.length && isHost && !match.enemy) {
                    const nextEnemy = ENEMIES[Math.floor(Math.random() * ENEMIES.length)];
                    const enemyData = { ...nextEnemy, turnCount: 0, damageDealtBy: {} };
                    const initiativeRoll = Math.random() < 1/6;
                    let log = initiativeRoll ? `¡INICIATIVA ENEMIGA! ${nextEnemy.name} ataca primero.` : `Aparece ${nextEnemy.name}.`;
                    
                    await updateDoc(doc(db, 'matches', matchId), { enemy: enemyData, log: arrayUnion(log), phase: initiativeRoll ? 'enemy' : 'players', playersReadyForNext: [] });
                    if (initiativeRoll && isHost) setTimeout(() => executeEnemyTurn({ ...match, enemy: enemyData }), 1000);
                } else {
                    await updateDoc(doc(db, 'matches', matchId), { playersReadyForNext: newList });
                }
            };

            if (match.players.every(p => p.hp <= 0) || match.deckRemaining <= 0) {
                return (
                    <div className="h-screen bg-slate-900 flex flex-col items-center justify-center p-8 text-center">
                        <h1 className="fantasy-font text-5xl text-white mb-4">{match.deckRemaining <= 0 ? 'VICTORIA' : 'DERROTA'}</h1>
                        <button onClick={onLeave} className="bg-white text-slate-900 px-8 py-4 rounded-2xl font-black uppercase">Volver</button>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col bg-white overflow-hidden">
                    <div className="bg-slate-900 text-white p-4 flex justify-between items-center">
                        <span className="fantasy-font">Incursión: {matchId}</span>
                        <span className="fantasy-font">Restantes: {match.deckRemaining}</span>
                    </div>
                    <div className="flex-grow p-4 flex flex-col gap-4 overflow-hidden">
                        <div className={`flex-grow rounded-3xl border-8 flex flex-col items-center justify-center transition-all ${match.enemy ? 'bg-orange-50 border-orange-200' : 'bg-slate-100 border-slate-200'}`}>
                            {match.enemy ? (
                                <>
                                    <i className={`fa-solid ${match.enemy.icon} text-9xl mb-4`}></i>
                                    <h2 className="fantasy-font text-2xl uppercase">{match.enemy.name}</h2>
                                    <p className="font-black text-red-500">HP: {match.enemy.hp}</p>
                                </>
                            ) : (
                                <button onClick={toggleReadyToAdvance} className="bg-amber-500 text-white px-12 py-6 rounded-3xl fantasy-font text-2xl shadow-xl">AVANZAR</button>
                            )}
                        </div>
                        <div className="h-32 bg-slate-50 rounded-2xl p-4 overflow-y-auto no-scrollbar border border-slate-100">
                            {match.log?.slice(-5).map((l, i) => <p key={i} className="text-[10px] font-bold text-slate-600 mb-1 border-l-2 border-amber-400 pl-2">{l}</p>)}
                            <div ref={logEndRef}></div>
                        </div>
                        <div className="grid grid-cols-3 gap-2">
                            {match.players.map(p => (
                                <div key={p.uid} className={`p-3 rounded-xl border-b-4 ${p.uid === match.activeTurnUid ? 'bg-slate-800 text-white border-amber-500' : 'bg-slate-100 border-slate-200'}`}>
                                    <p className="text-[8px] font-black truncate">{p.name}</p>
                                    <p className="text-[10px] font-bold">HP: {p.hp} | PA: {p.pa}</p>
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-2 justify-center py-2">
                            {myP && CLASSES[myP.classType].abilities.map(a => (
                                <button key={a.id} disabled={!isMyTurn || myP.pa < a.cost} onClick={() => useAbility(a)} className={`w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg ${isMyTurn && myP.pa >= a.cost ? 'bg-slate-800' : 'bg-slate-300'}`}>
                                    <i className={`fa-solid ${a.icon}`}></i>
                                </button>
                            ))}
                            <button onClick={endTurn} disabled={!isMyTurn} className="bg-amber-500 text-white px-6 rounded-xl fantasy-font text-xs">PASAR</button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('lobby');
            const [matchId, setMatchId] = useState(null);
            const [joinCode, setJoinCode] = useState('');

            useEffect(() => {
                if (!auth) return setLoading(false);
                return onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
            }, []);

            const createMatch = async () => {
                const code = generateRoomCode();
                await setDoc(doc(db, 'matches', code), { 
                    hostId: user.uid, status: 'waiting', difficulty: 'Normal', mode: 'multi', 
                    players: [{ uid: user.uid, name: user.email.split('@')[0], classType: null, isReady: false, role: 'host' }], 
                    chat: [], log: ["Sala creada."], deckRemaining: 15 
                });
                setMatchId(code);
                setView('lobby_waiting');
            };

            const joinMatch = async () => {
                const code = joinCode.toUpperCase().trim();
                const snap = await getDoc(doc(db, 'matches', code));
                if (snap.exists() && snap.data().players.length < 3) {
                    const p = { uid: user.uid, name: user.email.split('@')[0], classType: null, isReady: false, role: 'guest' };
                    await updateDoc(doc(db, 'matches', code), { players: [...snap.data().players, p] });
                    setMatchId(code);
                    setView('lobby_waiting');
                } else { alert("Sala llena o inexistente"); }
            };

            if (loading) return <div className="h-screen flex items-center justify-center fantasy-font text-2xl animate-pulse">CARGANDO...</div>;
            if (!user) return <AuthScreen />;
            if (view === 'lobby_waiting') return <LobbyWaiting matchId={matchId} user={user} onStart={() => setView('game')} onLeave={() => setView('lobby')} />;
            if (view === 'game') return <GameBoard matchId={matchId} user={user} onLeave={() => setView('lobby')} />;

            return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center p-8 text-center">
                    <h1 className="text-6xl fantasy-font text-slate-900 mb-2 uppercase">SHUFFLE RAID</h1>
                    <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.6em] mb-20">GitHub Edition v3.0</p>
                    <div className="flex flex-col gap-4 w-full max-w-xs">
                        <button onClick={createMatch} className="w-full bg-slate-900 text-white py-6 rounded-[36px] font-black uppercase text-[11px] tracking-widest shadow-2xl">Crear Sala</button>
                        <div className="pt-8 border-t border-slate-100 mt-4">
                            <input type="text" placeholder="ID SALA" className="w-full bg-slate-50 border border-slate-100 p-6 rounded-[32px] text-center mb-4 outline-none uppercase fantasy-font" value={joinCode} onChange={e => setJoinCode(e.target.value.slice(0,5))} />
                            <button onClick={joinMatch} disabled={joinCode.length < 5} className="w-full bg-slate-50 text-slate-900 py-5 rounded-[32px] font-black uppercase text-[10px] tracking-widest border border-slate-100">Unirse</button>
                        </div>
                        <button onClick={() => signOut(auth)} className="mt-12 text-slate-300 font-black uppercase text-[9px] tracking-[0.4em]">Desconectar</button>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
