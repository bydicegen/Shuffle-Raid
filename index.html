<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shuffle Raid v3.0 - Vanilla Edition</title>
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;400;700&display=swap');
        
        :root {
            --primary-accent: #f59e0b;
            --bg-main: #ffffff;
            --text-main: #0f172a;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .fantasy-font { font-family: 'Cinzel', serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        // --- FIREBASE IMPORT ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, getDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

        // --- CONFIGURACIÓN ---
        const firebaseConfig = {
            apiKey: "AIzaSyDnfytB6714BdUUMRMD8RjB-VFxiRq-ShM",
            authDomain: "shuffle-raid-bf1c3.firebaseapp.com",
            projectId: "shuffle-raid-bf1c3",
            storageBucket: "shuffle-raid-bf1c3.firebasestorage.app",
            messagingSenderId: "471193527658",
            appId: "1:471193527658:web:cc8666660b7967975af113",
            measurementId: "G-JWLQR80K84"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CONSTANTES ---
        const CLASSES = {
            Warrior: { hp: 20, def: 2, icon: 'fa-shield-halved', abilities: [{ id: 'atk', name: 'Ataque', cost: 1, power: 3, icon: 'fa-sword' }] },
            Mage: { hp: 15, def: 1, icon: 'fa-wand-sparkles', abilities: [{ id: 'atk', name: 'Magia', cost: 1, power: 3, icon: 'fa-sparkles' }] },
            Hunter: { hp: 15, def: 1, icon: 'fa-crosshairs', abilities: [{ id: 'atk', name: 'Flecha', cost: 1, power: 3, icon: 'fa-arrow-right' }] }
        };

        const ENEMIES = [
            { name: "Goblin", hp: 12, damage: 4, def: 1, icon: 'fa-users-viewfinder' },
            { name: "Ogro", hp: 26, damage: 9, def: 2, icon: 'fa-hand-fist' },
            { name: "Gólem", hp: 38, damage: 7, def: 5, icon: 'fa-mountain' }
        ];

        // --- ESTADO GLOBAL ---
        let state = {
            user: null,
            view: 'auth', // auth, lobby, waiting, game
            matchId: null,
            matchData: null,
            loading: true
        };

        // --- MOTOR DE RENDERIZADO ---
        function render() {
            const root = document.getElementById('app');
            if (state.loading) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center fantasy-font text-2xl animate-pulse">CARGANDO REINOS...</div>`;
                return;
            }

            if (!state.user) {
                renderAuth();
                return;
            }

            switch (state.view) {
                case 'lobby': renderLobby(); break;
                case 'waiting': renderWaiting(); break;
                case 'game': renderGame(); break;
            }
        }

        // --- VISTAS ---
        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-white flex flex-col items-center justify-center p-6 animate-fade-in">
                    <h1 class="text-5xl fantasy-font text-slate-900 mb-2 uppercase tracking-tighter">SHUFFLE RAID</h1>
                    <p class="text-slate-400 mb-12 uppercase tracking-[0.4em] text-[10px] font-black">GitHub Static Edition</p>
                    <div class="w-full max-w-xs space-y-4">
                        <input id="email" type="email" placeholder="EMAIL" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 font-bold text-xs">
                        <input id="pass" type="password" placeholder="PASSWORD" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 font-bold text-xs">
                        <button onclick="window.handleLogin()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">CONECTAR</button>
                        <button onclick="window.handleRegister()" class="w-full text-slate-400 text-[9px] font-black uppercase tracking-widest">CREAR NUEVO HÉROE</button>
                    </div>
                </div>
            `;
        }

        function renderLobby() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-white flex flex-col items-center justify-center p-8 text-center animate-fade-in">
                    <h1 class="text-6xl fantasy-font text-slate-900 mb-2 uppercase">SHUFFLE RAID</h1>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.6em] mb-20">Menú de Incursión</p>
                    <div class="flex flex-col gap-4 w-full max-w-xs">
                        <button onclick="window.createRoom()" class="w-full bg-slate-900 text-white py-6 rounded-[36px] font-black uppercase text-[11px] tracking-widest shadow-2xl">Crear Sala</button>
                        <div class="pt-8 border-t border-slate-100 mt-4">
                            <input id="joinCode" type="text" placeholder="ID SALA" class="w-full bg-slate-50 border border-slate-100 p-6 rounded-[32px] text-center mb-4 outline-none uppercase fantasy-font">
                            <button onclick="window.joinRoom()" class="w-full bg-slate-50 text-slate-900 py-5 rounded-[32px] font-black uppercase text-[10px] tracking-widest border border-slate-100">Unirse</button>
                        </div>
                        <button onclick="window.logout()" class="mt-12 text-slate-300 font-black uppercase text-[9px] tracking-[0.4em]">Desconectar</button>
                    </div>
                </div>
            `;
        }

        function renderWaiting() {
            const match = state.matchData;
            if (!match) return;
            const myP = match.players.find(p => p.uid === state.user.uid);
            const isHost = myP?.role === 'host';
            const taken = match.players.map(p => p.classType).filter(Boolean);
            const allReady = match.players.every(p => p.role === 'host' || p.isReady);

            document.getElementById('app').innerHTML = `
                <div class="min-h-screen bg-white flex flex-col p-6 animate-fade-in">
                    <div class="flex justify-between items-center mb-8">
                        <button onclick="window.leaveRoom()" class="text-slate-300 font-black text-[10px] uppercase">Salir</button>
                        <div class="bg-slate-50 px-5 py-2 rounded-full border border-slate-100">
                           <span class="text-[12px] fantasy-font font-bold text-slate-900">${state.matchId}</span>
                        </div>
                    </div>
                    <div class="space-y-3 mb-8">
                        ${match.players.map(p => `
                            <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-3xl border border-slate-100">
                                <div class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center">
                                    <i class="fa-solid ${p.classType ? CLASSES[p.classType].icon : 'fa-user-clock'}"></i>
                                </div>
                                <div class="flex-grow">
                                    <p class="text-[10px] font-black uppercase">${p.name} ${p.role === 'host' ? '👑' : ''}</p>
                                    <p class="text-[8px] font-black text-slate-400 uppercase">${p.classType || 'Eligiendo...'}</p>
                                </div>
                                ${p.role !== 'host' ? `<div class="w-8 h-8 rounded-xl flex items-center justify-center ${p.isReady ? 'bg-emerald-500 text-white' : 'bg-slate-200'}"><i class="fa-solid fa-check"></i></div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                    ${!myP?.isReady ? `
                        <div class="grid grid-cols-3 gap-3 mb-8">
                            ${Object.keys(CLASSES).map(key => `
                                <button onclick="window.selectHero('${key}')" class="flex flex-col items-center p-4 rounded-3xl border ${myP?.classType === key ? 'bg-slate-900 text-white' : 'bg-white border-slate-100 text-slate-400'}">
                                    <i class="fa-solid ${CLASSES[key].icon} text-xl mb-2"></i>
                                    <span class="text-[7px] font-black uppercase">${key}</span>
                                </button>
                            `).join('')}
                        </div>
                    ` : ''}
                    <button onclick="${isHost ? 'window.startCombat()' : 'window.toggleReady()'}" 
                        ${!myP?.classType || (isHost && !allReady) ? 'disabled' : ''}
                        class="w-full py-5 rounded-[28px] font-black uppercase text-[10px] bg-slate-900 text-white disabled:opacity-30">
                        ${isHost ? 'Empezar Incursión' : (myP?.isReady ? '¡Listo!' : 'Confirmar Héroe')}
                    </button>
                </div>
            `;
        }

        function renderGame() {
            const match = state.matchData;
            if (!match) return;
            const myP = match.players.find(p => p.uid === match.activeTurnUid);
            const isMyTurn = myP?.uid === state.user.uid && match.phase === 'players';

            document.getElementById('app').innerHTML = `
                <div class="h-screen flex flex-col bg-white overflow-hidden">
                    <div class="bg-slate-900 text-white p-4 flex justify-between items-center">
                        <span class="fantasy-font text-xs">SALA: ${state.matchId}</span>
                        <span class="fantasy-font text-xs">MAZO: ${match.deckRemaining}</span>
                    </div>
                    <div class="flex-grow p-4 flex flex-col gap-4 overflow-hidden">
                        <div class="flex-grow rounded-3xl border-8 flex flex-col items-center justify-center ${match.enemy ? 'bg-orange-50 border-orange-200' : 'bg-slate-100 border-slate-200'}">
                            ${match.enemy ? `
                                <i class="fa-solid ${match.enemy.icon} text-8xl mb-4 animate-bounce-subtle"></i>
                                <h2 class="fantasy-font text-xl uppercase">${match.enemy.name}</h2>
                                <p class="font-black text-red-500">HP: ${match.enemy.hp}</p>
                            ` : `
                                <button onclick="window.advance()" class="bg-amber-500 text-white px-12 py-6 rounded-3xl fantasy-font text-xl shadow-xl">AVANZAR</button>
                            `}
                        </div>
                        <div class="h-24 bg-slate-50 rounded-2xl p-4 overflow-y-auto no-scrollbar border border-slate-100 text-[10px] font-bold text-slate-600">
                            ${match.log?.slice(-4).map(l => `<p class="mb-1 border-l-2 border-amber-400 pl-2">${l}</p>`).join('')}
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            ${match.players.map(p => `
                                <div class="p-3 rounded-xl border-b-4 ${p.uid === match.activeTurnUid ? 'bg-slate-800 text-white border-amber-500' : 'bg-slate-100 border-slate-200'}">
                                    <p class="text-[8px] font-black truncate">${p.name}</p>
                                    <p class="text-[9px] font-bold">HP: ${p.hp} | PA: ${p.pa}</p>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex gap-2 justify-center py-4">
                            ${isMyTurn ? `
                                <button onclick="window.useAbility()" class="w-12 h-12 rounded-full bg-slate-900 text-white flex items-center justify-center shadow-lg">
                                    <i class="fa-solid fa-sword"></i>
                                </button>
                                <button onclick="window.endTurn()" class="bg-amber-500 text-white px-6 rounded-xl fantasy-font text-xs">PASAR</button>
                            ` : `<p class="text-[10px] font-black text-slate-400 uppercase">Esperando turno...</p>`}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- LÓGICA DE FIREBASE ---
        onAuthStateChanged(auth, (u) => {
            state.user = u;
            state.loading = false;
            render();
        });

        window.handleLogin = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); state.view = 'lobby'; render(); } catch (err) { alert(err.message); }
        };

        window.handleRegister = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await createUserWithEmailAndPassword(auth, e, p); state.view = 'lobby'; render(); } catch (err) { alert(err.message); }
        };

        window.logout = () => signOut(auth);

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            await setDoc(doc(db, 'matches', code), {
                hostId: state.user.uid, status: 'waiting', deckRemaining: 15,
                players: [{ uid: state.user.uid, name: state.user.email.split('@')[0], classType: null, isReady: false, role: 'host' }],
                log: ["Sala creada."]
            });
            state.matchId = code;
            state.view = 'waiting';
            startListener(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('joinCode').value.toUpperCase();
            const snap = await getDoc(doc(db, 'matches', code));
            if (snap.exists() && snap.data().players.length < 3) {
                const p = { uid: state.user.uid, name: state.user.email.split('@')[0], classType: null, isReady: false, role: 'guest' };
                await updateDoc(doc(db, 'matches', code), { players: arrayUnion(p) });
                state.matchId = code;
                state.view = 'waiting';
                startListener(code);
            } else { alert("Sala llena o no existe"); }
        };

        function startListener(code) {
            onSnapshot(doc(db, 'matches', code), (snap) => {
                if (!snap.exists()) { state.view = 'lobby'; render(); return; }
                state.matchData = snap.data();
                if (state.matchData.status === 'combat') state.view = 'game';
                render();
            });
        }

        window.selectHero = async (type) => {
            const players = state.matchData.players.map(p => p.uid === state.user.uid ? { ...p, classType: type, hp: CLASSES[type].hp, pa: 5 } : p);
            await updateDoc(doc(db, 'matches', state.matchId), { players });
        };

        window.toggleReady = async () => {
            const players = state.matchData.players.map(p => p.uid === state.user.uid ? { ...p, isReady: !p.isReady } : p);
            await updateDoc(doc(db, 'matches', state.matchId), { players });
        };

        window.startCombat = async () => {
            const order = state.matchData.players.map(p => p.uid).sort(() => Math.random() - 0.5);
            await updateDoc(doc(db, 'matches', state.matchId), { status: 'combat', turnOrder: order, activeTurnUid: order[0], phase: 'players' });
        };

        window.advance = async () => {
            const enemy = ENEMIES[Math.floor(Math.random() * ENEMIES.length)];
            const initiative = Math.random() < 1/6;
            const log = initiative ? `¡INICIATIVA ENEMIGA! ${enemy.name} ataca.` : `Aparece ${enemy.name}.`;
            await updateDoc(doc(db, 'matches', state.matchId), { 
                enemy: { ...enemy, turnCount: 0 }, 
                log: arrayUnion(log),
                phase: initiative ? 'enemy' : 'players'
            });
            if (initiative) setTimeout(() => executeEnemyTurn(), 1000);
        };

        async function executeEnemyTurn() {
            const match = state.matchData;
            const isDirect = Math.random() < 0.05;
            const target = match.players[Math.floor(Math.random() * match.players.length)];
            const dmg = isDirect ? match.enemy.damage : Math.max(1, match.enemy.damage - (target.def || 0));
            const log = isDirect ? `¡GOLPE DIRECTO! ${dmg} daño a ${target.name}.` : `${match.enemy.name} ataca a ${target.name} por ${dmg}.`;
            
            const players = match.players.map(p => p.uid === target.uid ? { ...p, hp: Math.max(0, p.hp - dmg), pa: Math.min(5, p.pa + 2) } : { ...p, pa: Math.min(5, p.pa + 2) });
            await updateDoc(doc(db, 'matches', state.matchId), { players, phase: 'players', log: arrayUnion(log) });
        }

        window.useAbility = async () => {
            const match = state.matchData;
            const myP = match.players.find(p => p.uid === state.user.uid);
            const dmg = Math.max(1, 3 - (match.enemy.def || 0));
            const enemyHp = Math.max(0, match.enemy.hp - dmg);
            
            const updates = { 
                "enemy.hp": enemyHp, 
                log: arrayUnion(`${myP.name} ataca por ${dmg}.`),
                players: match.players.map(p => p.uid === myP.uid ? { ...p, pa: p.pa - 1 } : p)
            };
            if (enemyHp <= 0) { updates.enemy = null; updates.deckRemaining = increment(-1); }
            await updateDoc(doc(db, 'matches', state.matchId), updates);
        };

        window.endTurn = async () => {
            const match = state.matchData;
            const idx = match.turnOrder.indexOf(match.activeTurnUid);
            if (idx < match.turnOrder.length - 1) {
                await updateDoc(doc(db, 'matches', state.matchId), { activeTurnUid: match.turnOrder[idx + 1] });
            } else {
                await updateDoc(doc(db, 'matches', state.matchId), { phase: 'enemy' });
                setTimeout(() => executeEnemyTurn(), 1000);
            }
        };

        window.leaveRoom = () => { state.view = 'lobby'; state.matchId = null; render(); };

        render();
    </script>
</body>
</html>
